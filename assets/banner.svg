<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#010409"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#21262d;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#21262d;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#21262d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#21262d;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Subtle top border line -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#accent)"/>

  <!-- Minimal grid -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#8b949e"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#8b949e"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#8b949e"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#8b949e"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#8b949e"/>
    <line x1="900" y1="0" x2="900" y2="320" stroke="#8b949e"/>
  </g>

  <!-- Small decorative dots top-right -->
  <circle cx="1120" cy="40" r="2" fill="#58a6ff" opacity="0.4"/>
  <circle cx="1140" cy="40" r="2" fill="#58a6ff" opacity="0.2"/>
  <circle cx="1160" cy="40" r="2" fill="#58a6ff" opacity="0.1"/>

  <!-- Main content, left-aligned -->
  <text x="100" y="100" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#7d8590">hey, i'm</text>
  <text x="100" y="148" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="48" font-weight="700" fill="#e6edf3">donn</text>

  <!-- Accent underline -->
  <rect x="100" y="160" width="120" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Bio line -->
  <text x="100" y="200" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" fill="#8b949e">building autonomous ai agent systems on a home lab.</text>
  <text x="100" y="224" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" fill="#8b949e">zero cloud budget. all local. all free tiers.</text>

  <!-- Stats row -->
  <g transform="translate(100,265)">
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#7d8590">9 agents</text>
    <text x="90" y="0" font-family="monospace" font-size="12" fill="#30363d">·</text>
    <text x="110" y="0" font-family="monospace" font-size="12" fill="#7d8590">4 nodes</text>
    <text x="180" y="0" font-family="monospace" font-size="12" fill="#30363d">·</text>
    <text x="200" y="0" font-family="monospace" font-size="12" fill="#7d8590">k3s + docker + ollama</text>
    <text x="370" y="0" font-family="monospace" font-size="12" fill="#30363d">·</text>
    <text x="390" y="0" font-family="monospace" font-size="12" fill="#7d8590">~1B+ free tokens/mo</text>
  </g>

  <!-- Right side: minimal node diagram -->
  <g transform="translate(750,80)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#484f58">cluster status</text>

    <!-- nexus -->
    <rect x="0" y="16" width="80" height="28" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="14" cy="30" r="3" fill="#3fb950"/>
    <text x="24" y="34" font-family="monospace" font-size="10" fill="#c9d1d9">nexus</text>
    <text x="100" y="34" font-family="monospace" font-size="9" fill="#484f58">RTX 3050 · 16GB</text>

    <!-- jupiter -->
    <rect x="0" y="52" width="80" height="28" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="14" cy="66" r="3" fill="#3fb950"/>
    <text x="24" y="70" font-family="monospace" font-size="10" fill="#c9d1d9">jupiter</text>
    <text x="100" y="70" font-family="monospace" font-size="9" fill="#484f58">7GB · media hub</text>

    <!-- luna -->
    <rect x="0" y="88" width="80" height="28" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="14" cy="102" r="3" fill="#d29922"/>
    <text x="24" y="106" font-family="monospace" font-size="10" fill="#c9d1d9">luna</text>
    <text x="100" y="106" font-family="monospace" font-size="9" fill="#484f58">Pi 4 · Pi-hole</text>

    <!-- galaxy -->
    <rect x="0" y="124" width="80" height="28" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="14" cy="138" r="3" fill="#f85149"/>
    <text x="24" y="142" font-family="monospace" font-size="10" fill="#c9d1d9">galaxy</text>
    <text x="100" y="142" font-family="monospace" font-size="9" fill="#484f58">Android · Termux</text>

    <!-- Services -->
    <text x="0" y="180" font-family="monospace" font-size="10" fill="#484f58">services</text>
    <text x="0" y="198" font-family="monospace" font-size="9" fill="#30363d">docker: 16 containers · k3s: 24 pods</text>
    <text x="0" y="214" font-family="monospace" font-size="9" fill="#30363d">ollama: 7 models · llama-server: 2 nodes</text>
  </g>
</svg>
