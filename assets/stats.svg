<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <rect width="600" height="200" rx="12" fill="url(#cardBg)" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="35" font-family="monospace" font-size="14" fill="#c9a84c" font-weight="bold">$ swarm status --live</text>
  <line x1="30" y1="45" x2="570" y2="45" stroke="#21262d" stroke-width="1"/>

  <!-- Agent status lines -->
  <text x="30" y="70" font-family="monospace" font-size="11" fill="#00ff88">●</text>
  <text x="45" y="70" font-family="monospace" font-size="11" fill="#8b949e">donn (CEO) — coordinating</text>
  <text x="300" y="70" font-family="monospace" font-size="11" fill="#00ff88">●</text>
  <text x="315" y="70" font-family="monospace" font-size="11" fill="#8b949e">hermes (gateway) — routing</text>

  <text x="30" y="90" font-family="monospace" font-size="11" fill="#00ff88">●</text>
  <text x="45" y="90" font-family="monospace" font-size="11" fill="#8b949e">brigid (media) — jellyfin:8097</text>
  <text x="300" y="90" font-family="monospace" font-size="11" fill="#00ff88">●</text>
  <text x="315" y="90" font-family="monospace" font-size="11" fill="#8b949e">morrigan (security) — scanning</text>

  <text x="30" y="110" font-family="monospace" font-size="11" fill="#00ff88">●</text>
  <text x="45" y="110" font-family="monospace" font-size="11" fill="#8b949e">ogma (research) — knowledge base</text>
  <text x="300" y="110" font-family="monospace" font-size="11" fill="#00ff88">●</text>
  <text x="315" y="110" font-family="monospace" font-size="11" fill="#8b949e">lugh (ops) — infrastructure</text>

  <text x="30" y="130" font-family="monospace" font-size="11" fill="#00ff88">●</text>
  <text x="45" y="130" font-family="monospace" font-size="11" fill="#8b949e">goibniu (ML) — RTX 3050 4GB</text>
  <text x="300" y="130" font-family="monospace" font-size="11" fill="#00ff88">●</text>
  <text x="315" y="130" font-family="monospace" font-size="11" fill="#8b949e">danu (arch) — agent framework</text>

  <!-- Bottom bar chart -->
  <text x="30" y="160" font-family="monospace" font-size="10" fill="#8b949e">RAM:</text>
  <rect x="70" y="150" width="120" height="8" rx="2" fill="#21262d"/>
  <rect x="70" y="150" width="85" height="8" rx="2" fill="#c9a84c" opacity="0.8"/>
  <text x="200" y="158" font-family="monospace" font-size="10" fill="#8b949e">12/16GB</text>

  <text x="300" y="160" font-family="monospace" font-size="10" fill="#8b949e">GPU:</text>
  <rect x="340" y="150" width="120" height="8" rx="2" fill="#21262d"/>
  <rect x="340" y="150" width="15" height="8" rx="2" fill="#00d4ff" opacity="0.8"/>
  <text x="470" y="158" font-family="monospace" font-size="10" fill="#8b949e">74/4096MB</text>

  <text x="30" y="180" font-family="monospace" font-size="10" fill="#8b949e">UPTIME:</text>
  <text x="100" y="180" font-family="monospace" font-size="10" fill="#00ff88">7h 10m</text>
  <text x="300" y="180" font-family="monospace" font-size="10" fill="#8b949e">LOAD:</text>
  <text x="350" y="180" font-family="monospace" font-size="10" fill="#00d4ff">1.09</text>
  <text x="420" y="180" font-family="monospace" font-size="10" fill="#8b949e">TOKENS:</text>
  <text x="490" y="180" font-family="monospace" font-size="10" fill="#c9a84c">~1B+/mo free</text>
</svg>
